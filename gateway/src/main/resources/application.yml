server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # Rotas explicitas com load balancer (lb://) sobre as N instancias
      # de cada microsservico descobertas via Eureka.
      # A ORDEM importa: predicados mais especificos vem primeiro.
      routes:
        # ms-estoque: balanceia entre as N instancias do estoque
        - id: ms-estoque
          uri: lb://ms-estoque
          predicates:
            - Path=/api/v1/estoque/**

        # ms-entregas: balanceia entre as N instancias de entregas
        - id: ms-entregas
          uri: lb://ms-entregas
          predicates:
            - Path=/api/v1/entregas/**

        # pizzaria-service: rota catch-all balanceada entre as N instancias do monolito
        - id: pizzaria-service
          uri: lb://pizzaria-service
          predicates:
            - Path=/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka-server:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:mySecretKeyThatIsVeryLongAndSecureForTokenGeneration12345678901234567890}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
