server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # Rota única: encaminha tudo para o serviço da pizzaria
        # lb:// usa o Eureka para descobrir o endereço do serviço
        - id: pizzaria-service
          uri: lb://pizzaria-service
          predicates:
            - Path=/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:mySecretKeyThatIsVeryLongAndSecureForTokenGeneration12345678901234567890}

management:
  endpoints:
    web:
      exposure:
        include: health,info
