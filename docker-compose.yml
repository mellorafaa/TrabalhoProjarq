services:

  # ── 0. Message Broker (RabbitMQ) ────────────────────────────────────────────
  # Singleton: 1 instância única
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - pizzaria-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 1. Name Server (Eureka) ─────────────────────────────────────────────────
  # Singleton: 1 instância única (registro central)
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - pizzaria-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Serviço de Pizzaria (monolito) ───────────────────────────────────────
  # ESCALÁVEL: docker compose up --scale pizzaria-service=N
  # Sem container_name (Compose gera nome único) e sem porta fixa do host
  # para permitir N réplicas. O acesso ao serviço é feito SEMPRE pelo gateway.
  pizzaria-service:
    build: .
    expose:
      - "8081"
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka/
      - JWT_SECRET=mySecretKeyThatIsVeryLongAndSecureForTokenGeneration12345678901234567890
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - MS_ESTOQUE_URL=http://ms-estoque:8082/api/v1
    networks:
      - pizzaria-network
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── 3. Microsserviço de Estoque ─────────────────────────────────────────────
  # ESCALÁVEL: docker compose up --scale ms-estoque=N
  ms-estoque:
    build: ./ms-estoque
    expose:
      - "8082"
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka/
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
    networks:
      - pizzaria-network
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── 4. Microsserviço de Entregas ────────────────────────────────────────────
  # ESCALÁVEL (>= 3 instâncias por requisito do enunciado):
  # docker compose up --scale ms-entregas=3
  # Todas as instâncias consomem da MESMA fila (competing consumers),
  # garantindo que cada mensagem é processada uma única vez.
  ms-entregas:
    build: ./ms-entregas
    expose:
      - "8083"
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka/
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
    networks:
      - pizzaria-network
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── 5. API Gateway ──────────────────────────────────────────────────────────
  # Singleton: única porta de entrada (8080) com load balancer integrado
  # (Spring Cloud LoadBalancer + Eureka Discovery: lb://<servico>)
  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka/
      - JWT_SECRET=mySecretKeyThatIsVeryLongAndSecureForTokenGeneration12345678901234567890
    networks:
      - pizzaria-network
    depends_on:
      eureka-server:
        condition: service_healthy

networks:
  pizzaria-network:
    driver: bridge
