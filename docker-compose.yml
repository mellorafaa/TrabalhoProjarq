services:

  # ── 1. Name Server (Eureka) ─────────────────────────────────────────────────
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - pizzaria-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Serviço de Pizzaria (monolito) ───────────────────────────────────────
  pizzaria-service:
    build: .
    container_name: pizzaria-service
    ports:
      - "8081:8081"   # exposto para debug/testes; em produção remover
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka/
      - JWT_SECRET=mySecretKeyThatIsVeryLongAndSecureForTokenGeneration12345678901234567890
    networks:
      - pizzaria-network
    depends_on:
      eureka-server:
        condition: service_healthy

  # ── 3. API Gateway ──────────────────────────────────────────────────────────
  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8080:8080"   # único ponto de entrada para os clientes
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka/
      - JWT_SECRET=mySecretKeyThatIsVeryLongAndSecureForTokenGeneration12345678901234567890
    networks:
      - pizzaria-network
    depends_on:
      eureka-server:
        condition: service_healthy

networks:
  pizzaria-network:
    driver: bridge
