server:
  port: 8081   # porta interna; o gateway fica em 8080

spring:
  application:
    name: pizzaria-service   # nome usado pelo Eureka para descoberta
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:pizzadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
    schema-locations: classpath:schema.sql
    data-locations: classpath:data.sql
  h2:
    console:
      enabled: true
      path: /h2

logging:
  level:
    org:
      springframework:
        jdbc: DEBUG

# JWT ainda é necessário para GERAR o token no login
jwt:
  secret: ${JWT_SECRET:mySecretKeyThatIsVeryLongAndSecureForTokenGeneration12345678901234567890}
  expiration: 86400000

# Configuração do Eureka (name server)
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka-server:8761/eureka/}
  instance:
    prefer-ip-address: true