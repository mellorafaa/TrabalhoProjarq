server:
  port: 8081   # porta interna; o gateway fica em 8080

spring:
  application:
    name: pizzaria-service   # nome usado pelo Eureka para descoberta
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:pizzadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
    schema-locations: classpath:schema.sql
    data-locations: classpath:data.sql
  h2:
    console:
      enabled: true
      path: /h2
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

logging:
  level:
    com.bcopstein: DEBUG
    org.springframework.web: DEBUG
    org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver: DEBUG

# JWT ainda é necessário para GERAR o token no login
jwt:
  secret: ${JWT_SECRET:mySecretKeyThatIsVeryLongAndSecureForTokenGeneration12345678901234567890}
  expiration: 86400000

# URL do ms-estoque. O host "ms-estoque" e resolvido pelo DNS interno
# do Docker Compose, que faz round-robin entre TODAS as replicas escaladas
# do servico (load balancer lado cliente via DNS). Cada chamada pode bater
# em uma replica diferente sem precisar de configuracao extra.
ms-estoque:
  url: ${MS_ESTOQUE_URL:http://ms-estoque:8082/api/v1}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka-server:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    # instance-id unico por replica (necessario para Compose --scale,
    # caso contrario varias replicas se registram com o mesmo id).
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}