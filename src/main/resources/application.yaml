spring:
  datasource:
    url: jdbc:h2:mem:pizzadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always   # executa schema.sql no boot
    schema-locations: classpath:schema.sql
    data-locations: classpath:data.sql
  h2:
    console:
      enabled: true
      path: /h2

logging:
  level:
    org:
      springframework:
        jdbc: DEBUG

# Configurações JWT
jwt:
  secret: mySecretKeyThatIsVeryLongAndSecureForTokenGeneration12345678901234567890
  expiration: 86400000  # 24 horas em milissegundos

application:
  name: ex4-lancheriaddd-v1
  port: 8080